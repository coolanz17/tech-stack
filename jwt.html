<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Decoder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 h-screen overflow-y-auto">

    <div class="max-w-5xl mx-auto">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">JWT Token Decoder</h2>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 mb-6">
            <label for="jwt-input" class="block text-sm font-medium text-gray-700 mb-2">Paste your JWT here</label>
            <textarea id="jwt-input" rows="5" class="w-full p-3 font-mono text-sm border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="output-area" style="display: none;">
            
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-red-50 border-b border-red-100 px-4 py-3 text-red-700 font-semibold text-sm">Header (Algorithm & Type)</div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 text-sm" id="header-table">
                        <tbody class="divide-y divide-gray-200 bg-white"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-purple-50 border-b border-purple-100 px-4 py-3 text-purple-700 font-semibold text-sm">Payload (Data & Claims)</div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 text-sm" id="payload-table">
                        <tbody class="divide-y divide-gray-200 bg-white"></tbody>
                    </table>
                </div>
            </div>

        </div>
        
        <div id="error-msg" class="hidden bg-red-50 text-red-600 p-4 rounded-md border border-red-200 mt-4">
            Invalid JWT format. Please ensure you pasted a valid token.
        </div>
    </div>

    <script>
        const input = document.getElementById('jwt-input');
        const outputArea = document.getElementById('output-area');
        const errorMsg = document.getElementById('error-msg');

        function parseJwt(token) {
            try {
                const parts = token.split('.');
                if (parts.length !== 3) throw new Error("Invalid token");
                
                const header = JSON.parse(atob(parts[0].replace(/-/g, '+').replace(/_/g, '/')));
                const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
                return { header, payload };
            } catch (e) {
                return null;
            }
        }

        function renderTable(dataObj, tableId) {
            const tbody = document.querySelector(`#${tableId} tbody`);
            tbody.innerHTML = '';
            
            for (const [key, value] of Object.entries(dataObj)) {
                const tr = document.createElement('tr');
                let displayValue = typeof value === 'object' ? JSON.stringify(value, null, 2) : value;
                
                // Format dates for common epoch claims
                if (['iat', 'exp', 'nbf'].includes(key) && typeof value === 'number') {
                    displayValue = `${value} <span class="text-gray-400 text-xs ml-2">(${new Date(value * 1000).toLocaleString()})</span>`;
                }

                tr.innerHTML = `
                    <td class="px-4 py-3 font-mono text-gray-900 bg-gray-50 w-1/3 border-r">${key}</td>
                    <td class="px-4 py-3 font-mono text-gray-600 break-all">${displayValue}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        input.addEventListener('input', (e) => {
            const token = e.target.value.trim();
            if (!token) {
                outputArea.style.display = 'none';
                errorMsg.classList.add('hidden');
                return;
            }

            const decoded = parseJwt(token);
            if (decoded) {
                errorMsg.classList.add('hidden');
                outputArea.style.display = 'grid';
                renderTable(decoded.header, 'header-table');
                renderTable(decoded.payload, 'payload-table');
            } else {
                outputArea.style.display = 'none';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
