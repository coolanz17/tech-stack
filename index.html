<!DOCTYPE html>
<html lang="en" class="bg-gray-50 antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev UI - Tech Stack Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="h-screen flex overflow-hidden text-gray-800">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-gray-200">
            <h1 class="text-xl font-bold text-indigo-600"><i class="fa-solid fa-code mr-2"></i>Dev UI</h1>
        </div>

        <nav class="flex-1 overflow-y-auto p-4 space-y-6 text-sm">
            <div>
                <h3 class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Network</h3>
                <div class="space-y-1">
                    <a href="api-tester.html" target="tool-frame" class="block px-3 py-2 rounded-md hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                        <i class="fa-solid fa-satellite-dish w-5 text-center mr-2"></i> API Tester
                    </a>
                </div>
            </div>

            <div>
                <h3 class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Security</h3>
                <div class="space-y-1">
                    <a href="jwt.html" target="tool-frame" class="block px-3 py-2 rounded-md hover:bg-indigo-50 hover:text-indigo-600 transition-colors bg-indigo-50 text-indigo-600" id="nav-jwt">
                        <i class="fa-solid fa-key w-5 text-center mr-2"></i> JWT Decoder
                    </a>
                </div>
            </div>

            <div>
                <h3 class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Utilities</h3>
                <div class="space-y-1">
                    <a href="epoch.html" target="tool-frame" class="block px-3 py-2 rounded-md hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                        <i class="fa-solid fa-clock w-5 text-center mr-2"></i> Epoch Converter
                    </a>
                    <a href="timezone.html" target="tool-frame" class="block px-3 py-2 rounded-md hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                        <i class="fa-solid fa-globe w-5 text-center mr-2"></i> Timezone Converter
                    </a>
                    <a href="encode-decode.html" target="tool-frame" class="block px-3 py-2 rounded-md hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                        <i class="fa-solid fa-shuffle w-5 text-center mr-2"></i> Encode / Decode
                    </a>
                    <a href="formatter.html" target="tool-frame" class="block px-3 py-2 rounded-md hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                        <i class="fa-solid fa-align-left w-5 text-center mr-2"></i> Code Formatter
                    </a>
                </div>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen">
        <iframe name="tool-frame" src="jwt.html" class="w-full h-full border-none"></iframe>
    </main>

    <script>
        // Simple script to highlight active sidebar link
        const links = document.querySelectorAll('nav a');
        links.forEach(link => {
            link.addEventListener('click', function() {
                links.forEach(l => l.classList.remove('bg-indigo-50', 'text-indigo-600'));
                this.classList.add('bg-indigo-50', 'text-indigo-600');
            });
        });
    </script>
</body>
</html>
